<!DOCTYPE html>
<html>

<head>
    <title>Edit Your Reply</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 60px auto;
            padding: 20px;
        }

        textarea {
            width: 100%;
            height: 150px;
            padding: 12px;
            font-size: 15px;
            border: 2px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
        }

        button {
            background: #22c55e;
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 12px;
        }

        #success {
            display: none;
            color: #22c55e;
            font-weight: bold;
            font-size: 18px;
            margin-top: 20px;
        }
    </style>
</head>

<body>
    <h2>✏️ Edit Your Reply</h2>
    <p>Make any changes below, then click Post.</p>
    <textarea id="reply"></textarea>
    <br>
    <button onclick="postReply()">Post Reply to Google</button>
    <p id="success">✅ Reply posted successfully!</p>

    <script>
        const params = new URLSearchParams(window.location.search);
        const token = params.get("token");

        // Pre-fill the reply from your backend
        fetch(`/api/get-reply?token=${token}`)
            .then(r => r.json())
            .then(data => {
                document.getElementById("reply").value = data.ai_reply;
            });

        function postReply() {
            const reply = document.getElementById("reply").value;
            fetch("/api/edit", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ token, reply })
            })
                .then(r => r.json())
                .then(data => {
                    if (data.success) {
                        document.getElementById("success").style.display = "block";
                    }
                });
        }
    </script>
</body>

</html>
